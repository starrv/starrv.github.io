<!DOCTYPE html>
<html>
	<head>
		<title>
			Weather Summary
		</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<!-- image icon -->
		<link rel="shortcut icon" type="image/png" href="https://www.metaweather.com/static/img/weather/png/64/c.png">

		<!-- CSS stylesheets -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">
		<link rel="stylesheet" type="text/css" href="style.css">

		<!-- JavaScript scripts -->
		<script type="text/javascript" src="script.js"></script>
	</head>
	<body>
		<div class="container-fluid m-0 p-0">
			<div class='row mb-4 p-0 header'>
				<h1 id="title" class="w-100 col-sm m-0 p-2">Get The Latest Weather</h1>
			</div>

			<div class="row m-0 content-display">
				<div id="display" class="row mb-0 w-50 border border-dark rounded-top mx-auto mt-2"></div>
			</div>

			<div id="theForm" class="row m-0 p-2 w-50 border border-dark rounded-bottom mx-auto content-form">
				<div class="col-md m-2">
					<label for="location"><strong>Enter location</strong>:
					</label>
				</div>
				<div class="col-md m-2 w-75">
					<input type="text" id="location" class="rounded w-75">
				</div>
				<div class="col-md m-2">
					<input type="submit" value="submit" id="submit" class="rounded">
				</div>
			</div>

			<p class="m-4 mx-auto w-50 content-foot-notes text-justify"><strong>Note</strong>:  Weather data has been extracted from <em><a href="https://meta-weather.vercel.app/" target="_blank">https://meta-weather.vercel.app/</a></em></p>

		</div>
		</div>
	</body>
</html>
